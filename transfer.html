<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الاشتراك - تحويل الأموال</title>
    <meta name="description" content="صفحة تحويل الأموال للاشتراك في ميزات متقدمة" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="container">
        <section class="hero">
            <h1>إرسال صورة التحويل</h1>
            <p class="subtitle">الرجاء ملء النموذج أدناه وإرفاق صورة إيصال التحويل.</p>
        </section>
        <section class="contact-info">
            <h2>بيانات التواصل</h2>
            <ul>
                <li>إنستاباي (Instapay) – رقم الهاتف: <strong>01551407492</strong></li>
                <li>محفظة رقم: <strong>01557899776</strong></li>
            </ul>
        </section>
        <section class="form-section">
            <h2>نموذج رفع الصورة</h2>
            <form id="transferForm" novalidate>
                <div class="form-group">
                    <label for="fullName">الاسم الكامل</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="أدخل اسمك الكامل" />
                </div>
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" required placeholder="example@domain.com" />
                </div>
                <div class="form-group">
                    <label for="phone">رقم الهاتف</label>
                    <input type="tel" id="phone" name="phone" required placeholder="015xxxxxxxx" />
                </div>
                <div class="form-group">
                    <label for="transferImage">صورة إيصال التحويل</label>
                    <input type="file" id="transferImage" name="transferImage" accept="image/*" required />
                    <div id="preview" class="preview"></div>
                </div>
                <button type="submit" class="submit-btn">إرسال</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
